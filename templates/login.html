{% extends "base.html" %}
{% block title %}Login — DayGoalz{% endblock %}

{% block content %}
<div class="auth-bg">
    <div class="w-full max-w-md px-margin-mobile">
        <div class="mb-xl text-center">
            <h1 class="font-headline-md text-headline-md font-bold text-primary">DayGoalz</h1>
            <p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mt-xs">Stay Disciplined</p>
        </div>

        <div class="bg-surface border-2 border-on-surface brutalist-shadow p-lg">
            <h2 class="font-headline-sm text-headline-sm mb-xl">Sign In</h2>

            <div class="space-y-lg">
                <div>
                    <label class="font-label-md text-label-md text-primary block mb-xs">EMAIL</label>
                    <input id="email" type="email" autocomplete="email"
                        class="notebook-input font-body-md text-body-md py-xs"
                        placeholder="you@example.com"/>
                    <p class="text-error font-label-sm text-label-sm mt-xs hidden" id="err-email"></p>
                </div>
                <div>
                    <label class="font-label-md text-label-md text-primary block mb-xs">PASSWORD</label>
                    <input id="password" type="password" autocomplete="current-password"
                        class="notebook-input font-body-md text-body-md py-xs"
                        placeholder="••••••••"/>
                    <p class="text-error font-label-sm text-label-sm mt-xs hidden" id="err-password"></p>
                </div>
            </div>

            <button id="login-btn" onclick="doLogin()"
                class="mt-xl w-full bg-primary text-on-primary px-lg py-md border-2 border-on-surface brutalist-shadow brutalist-shadow-hover brutalist-shadow-active font-label-md text-label-md uppercase font-bold tracking-widest">
                Enter
            </button>

            <p class="mt-lg font-body-md text-body-md text-center text-on-surface-variant">
                No account?
                <a href="/register" class="text-primary border-b border-primary">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function doLogin() {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    ["email","password"].forEach(f => {
        const el = document.getElementById("err-" + f);
        el.textContent = ""; el.classList.add("hidden");
    });

    try {
        const res = await apiFetch("/login", {
            method: "POST",
            body: JSON.stringify({ email, password }),
        });
        window.location = res.redirect;
    } catch (e) {
        const errs = e.data?.errors || {};
        Object.entries(errs).forEach(([field, msg]) => {
            const el = document.getElementById("err-" + field);
            if (el) { el.textContent = msg; el.classList.remove("hidden"); }
        });
        if (!Object.keys(errs).length) showToast("Login failed. Try again.");
    }
}

document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
</script>
{% endblock %}
