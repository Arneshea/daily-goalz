{% extends "base.html" %}
{% block title %}Stats — DayGoalz{% endblock %}

{% block content %}
<main class="md:ml-64 pt-24 pb-24 md:pb-xl px-margin-mobile md:px-margin-desktop min-h-screen">

    <header class="mb-2xl">
        <h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg mb-sm">Discipline Analytics</h1>
        <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl">A clinical overview of your performance. Progress is not a matter of speed, but of consistent rhythm.</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-lg" id="stats-grid">
        <div class="md:col-span-12 text-center py-xl text-on-surface-variant font-body-md italic">Loading analytics…</div>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script>
async function loadStats() {
    const today = new Date();
    const year  = today.getFullYear();
    const month = today.getMonth() + 1;

    const [goals, stats, checks] = await Promise.all([
        apiFetch("/api/goals"),
        apiFetch(`/api/stats/monthly?year=${year}&month=${month}`),
        apiFetch(`/api/checks?year=${year}&month=${month}`),
    ]);

    const days = daysInMonth(year, month);
    const grid = document.getElementById("stats-grid");

    // Per-day completion counts
    const dayCounts = Array.from({length: days}, (_, i) => {
        const d = i + 1;
        return goals.filter(g => (checks[g.id] || []).includes(d)).length;
    });
    const maxDay = Math.max(1, ...dayCounts);

    // Bar chart HTML
    const barChart = dayCounts.map((c, i) => {
        const d = i + 1;
        const isToday = d === today.getDate();
        const isFut   = d > today.getDate();
        const h = isFut ? 4 : Math.max(4, Math.round(c / maxDay * 80));
        return `<div class="flex flex-col items-center justify-end gap-xs" style="flex:1">
            <span class="font-label-sm text-[9px] text-on-surface-variant">${c > 0 && !isFut ? c : ""}</span>
            <div class="w-full ${isToday ? "bg-primary" : "bg-secondary-container"} border border-on-surface transition-all" style="height:${h}px"></div>
            <span class="font-label-sm text-[9px] text-on-surface-variant">${d}</span>
        </div>`;
    }).join("");

    // Goal performance bars
    const goalBars = goals.map(g => {
        const elapsed = today.getDate();
        const done    = (checks[g.id] || []).filter(d => d <= elapsed).length;
        const pct     = elapsed > 0 ? Math.round(done / elapsed * 100) : 0;
        const color   = pct >= 70 ? "bg-secondary" : pct >= 40 ? "bg-primary" : "bg-error";
        return `<div class="mb-lg">
            <div class="flex justify-between items-end mb-xs">
                <span class="font-label-md text-label-md uppercase">${g.emoji} ${g.name}</span>
                <span class="font-label-md text-label-md">${pct}%</span>
            </div>
            <div class="h-6 w-full bg-surface-container-highest border border-on-surface">
                <div class="h-full ${color} border-r-2 border-on-surface transition-all duration-700" style="width:${pct}%"></div>
            </div>
        </div>`;
    }).join("") || `<p class="font-body-md italic text-on-surface-variant">No goals yet. Add some from the Monthly Grid!</p>`;

    // Heatmap (this month)
    const firstDow = new Date(year, month - 1, 1).getDay();
    const heatCells = Array(firstDow).fill(`<div class="heatmap-cell opacity-0"></div>`).join("") +
        Array.from({length: days}, (_, i) => {
            const d   = i + 1;
            const cnt = goals.filter(g => (checks[g.id] || []).includes(d)).length;
            const max = goals.length || 1;
            const lvl = max > 0 ? Math.round(cnt / max * 3) : 0;
            const colors = ["bg-surface-container-highest","bg-secondary-container","bg-secondary","bg-on-secondary-fixed-variant"];
            const isFut = d > today.getDate();
            return `<div class="heatmap-cell ${isFut ? "bg-surface-container-highest opacity-30" : colors[lvl]}" title="Day ${d}: ${cnt}/${max} goals"></div>`;
        }).join("");

    grid.innerHTML = `
        <!-- Summary cards -->
        <div class="md:col-span-3 bg-surface-container-low border-2 border-on-surface p-lg brutalist-shadow">
            <h3 class="font-label-md text-label-md uppercase tracking-widest mb-md">This Month</h3>
            <div class="text-4xl font-bold text-primary mb-xs">${stats.pct}%</div>
            <div class="font-label-sm text-label-sm text-on-surface-variant mb-md">Completion rate</div>
            <div class="h-3 bg-outline-variant border border-on-surface">
                <div class="h-full bg-secondary transition-all duration-700" style="width:${stats.pct}%"></div>
            </div>
        </div>
        <div class="md:col-span-3 bg-primary-fixed border-2 border-on-surface p-lg brutalist-shadow">
            <h3 class="font-label-md text-label-md uppercase tracking-widest mb-md">Best Streak</h3>
            <div class="text-4xl font-bold text-primary mb-xs">${stats.best_streak}</div>
            <div class="font-label-sm text-label-sm text-on-surface-variant">Days in a row (all goals)</div>
        </div>
        <div class="md:col-span-3 bg-surface-container-highest border-2 border-on-surface p-lg brutalist-shadow">
            <h3 class="font-label-md text-label-md uppercase tracking-widest mb-md">Tasks Done</h3>
            <div class="text-4xl font-bold text-primary mb-xs">${stats.total_done}</div>
            <div class="font-label-sm text-label-sm text-on-surface-variant">of ${stats.possible} possible</div>
        </div>
        <div class="md:col-span-3 bg-surface border-2 border-on-surface p-lg brutalist-shadow">
            <h3 class="font-label-md text-label-md uppercase tracking-widest mb-md">Active Goals</h3>
            <div class="text-4xl font-bold text-primary mb-xs">${stats.total_goals}</div>
            <div class="font-label-sm text-label-sm text-on-surface-variant">disciplines tracked</div>
        </div>

        <!-- Daily bar chart -->
        <section class="md:col-span-12 bg-surface-container-lowest border-2 border-on-surface brutalist-shadow p-lg">
            <h3 class="font-headline-sm text-headline-sm mb-lg">Daily completions — ${MONTH_NAMES[month-1]} ${year}</h3>
            <div class="flex items-end gap-[2px] h-[100px] overflow-x-auto no-scrollbar">${barChart}</div>
        </section>

        <!-- Goal performance -->
        <section class="md:col-span-8 bg-surface-container-lowest border-2 border-on-surface p-lg">
            <h3 class="font-headline-sm text-headline-sm mb-xl">Goal performance</h3>
            ${goalBars}
        </section>

        <!-- Heatmap this month -->
        <section class="md:col-span-4 bg-surface-container-lowest border-2 border-on-surface p-lg">
            <h3 class="font-headline-sm text-headline-sm mb-md">${MONTH_NAMES[month-1]} heatmap</h3>
            <div class="grid grid-cols-7 gap-[3px]">${heatCells}</div>
            <div class="flex items-center gap-xs mt-md">
                <span class="font-label-sm text-[10px] uppercase">Less</span>
                <div class="w-3 h-3 bg-surface-container-highest border border-outline-variant"></div>
                <div class="w-3 h-3 bg-secondary-container border border-outline-variant"></div>
                <div class="w-3 h-3 bg-secondary border border-outline-variant"></div>
                <div class="w-3 h-3 bg-on-secondary-fixed-variant border border-outline-variant"></div>
                <span class="font-label-sm text-[10px] uppercase">More</span>
            </div>
        </section>
    `;
}

loadStats();
</script>
{% endblock %}
